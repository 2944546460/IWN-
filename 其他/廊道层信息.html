<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廊道层参数动态调整原型 (V3.0 包含3层+新规则)</title>
    <style>
        body {
            background-color: #121820;
            color: #d1d5db;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .sidebar {
            background-color: #1c2633;
            width: 380px;
            padding: 20px 15px;
            border-right: 1px solid #2d3748;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            height: 850px;
            overflow-y: auto;
        }

        .card {
            border-bottom: 1px dashed #374151;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }

        .toggle-switch {
            width: 36px;
            height: 18px;
            background-color: #0ea5e9;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .label {
            width: 95px;
            color: #9ca3af;
        }

        .required {
            color: #ef4444;
            margin-right: 3px;
        }

        input,
        select {
            background-color: transparent;
            border: 1px solid #4b5563;
            color: #ffffff;
            padding: 6px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }

        input:focus {
            border-color: #0ea5e9;
        }

        input[disabled] {
            background-color: #2d3748;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .height-input {
            width: 50px;
            text-align: center;
        }

        .width-input {
            width: 100%;
            box-sizing: border-box;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .hint-text {
            font-size: 11px;
            color: #6b7280;
            margin-left: 95px;
            margin-top: 0px;
            margin-bottom: 14px;
            line-height: 1.4;
        }

        .nofly-alert {
            background-color: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
            color: #fca5a5;
            padding: 8px 12px;
            font-size: 12px;
            margin-bottom: 20px;
            border-radius: 0 4px 4px 0;
            line-height: 1.5;
        }

        .error-border {
            border-color: #ef4444 !important;
        }

        .error-text {
            color: #ef4444;
            font-size: 11px;
            margin-left: 95px;
            margin-top: -6px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="sidebar">


        <div id="layers-container">
            <!-- Layers will be generated here -->
        </div>

        <button id="add-layer-btn"
            style="width: 100%; padding: 10px; background-color: #2d3748; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 20px;">+
            添加廊道层</button>
    </div>

    <script>
        const layersContainer = document.getElementById('layers-container');
        const addLayerBtn = document.getElementById('add-layer-btn');

        // 初始化数据包含三层默认数据
        let layers = [
            { id: 1, name: '近地层1号', start: 20, end: 100, width: 500 },
            { id: 2, name: '近地层2号', start: 100, end: 200, width: 500 },
            { id: 3, name: '近地层3号', start: 200, end: 300, width: 500 }
        ];

        function renderLayers() {
            layersContainer.innerHTML = '';
            layers.forEach((layer, index) => {
                const isFirst = index === 0;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <span>${layer.name}</span>
                        <div class="toggle-switch"></div>
                    </div>
                    
                    <div class="form-row">
                        <div class="label"><span class="required">*</span>起止高度:</div>
                        <div class="input-wrapper">
                            <input type="number" id="l${index}-start" class="height-input" value="${layer.start}" disabled title="${isFirst ? '起点高度已锁定为禁飞区上限(20m)' : '自动读取并绑定上一层终止高度'}"> 
                            <span style="color: #6b7280;">—</span>
                            <input type="number" id="l${index}-end" class="height-input layer-end" data-index="${index}" value="${layer.end}">
                            <span style="color: #6b7280;">m</span>
                        </div>
                    </div>
                    <div id="l${index}-height-error" class="error-text"></div>
                    <div class="hint-text" id="l${index}-height-hint"></div>
                    
                    <div class="form-row">
                        <div class="label"><span class="required">*</span>廊道层宽:</div>
                        <div class="input-wrapper">
                            <input type="number" id="l${index}-width" class="width-input layer-width" data-index="${index}" value="${layer.width}" placeholder="100-8000">
                            <span style="color: #6b7280;">m</span>
                        </div>
                    </div>
                    <div id="l${index}-width-error" class="error-text">宽度需在 100m - 8000m 之间</div>
                    <div class="hint-text" id="l${index}-width-hint"></div>

                    <div class="form-row">
                        <div class="label"><span class="required">*</span>最低速度限制:</div>
                        <div class="input-wrapper"><input type="text" class="width-input"><span style="color: #6b7280;">m/s</span></div>
                    </div>
                    <div class="form-row">
                        <div class="label"><span class="required">*</span>最高速度限制:</div>
                        <div class="input-wrapper"><input type="text" class="width-input"><span style="color: #6b7280;">m/s</span></div>
                    </div>
                `;
                layersContainer.appendChild(card);
            });

            document.querySelectorAll('.layer-end').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    layers[idx].end = parseInt(e.target.value) || 0;
                    updateData();
                });
            });

            document.querySelectorAll('.layer-width').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    layers[idx].width = parseInt(e.target.value) || 0;
                    updateWidths();
                });
            });

            updateData();
        }

        // 核心计算逻辑：更新高度联动与比例切分
        function updateData() {
            for (let i = 0; i < layers.length; i++) {
                // 起点联动逻辑
                if (i === 0) {
                    layers[i].start = 20;
                } else {
                    layers[i].start = layers[i - 1].end;
                    const startInput = document.getElementById(`l${i}-start`);
                    if (startInput) startInput.value = layers[i].start;
                }

                // 高度校验逻辑下限：1000m以上厚度150m，1000m以下厚度50m
                const minDiff = layers[i].start >= 1000 ? 150 : 50;
                const endInput = document.getElementById(`l${i}-end`);
                const errorText = document.getElementById(`l${i}-height-error`);
                const hintText = document.getElementById(`l${i}-height-hint`);

                if (!endInput) continue;

                const diff = layers[i].end - layers[i].start;

                if (diff < minDiff) {
                    endInput.classList.add('error-border');
                    errorText.style.display = 'block';
                    errorText.innerHTML = `单层高度差值不得低于 ${minDiff}m`;
                    hintText.innerHTML = `当前厚度 ${diff}m (不足${minDiff}m，无法切分)`;
                } else {
                    endInput.classList.remove('error-border');
                    errorText.style.display = 'none';
                    // 纵向比例分配：系统静默按 安全区60% / 上缓冲20% / 下缓冲20% 切分
                    const safe = (diff * 0.6).toFixed(1);
                    const buffer = (diff * 0.2).toFixed(1);
                    hintText.innerHTML = `内部高：<span style="color:#0ea5e9">安全区 ${safe}m</span> | 上下各 ${buffer}m`;
                }
            }
            // 高度改变不会影响宽度计算，这里保留调用以确保状态一致
            updateWidths();
        }

        // 计算比例和更新宽度UI的函数
        function updateWidths() {
            layers.forEach((layer, i) => {
                const widthInput = document.getElementById(`l${i}-width`);
                const errorText = document.getElementById(`l${i}-width-error`);
                const hintText = document.getElementById(`l${i}-width-hint`);

                if (!widthInput) return;

                // 宽容度约束: 100m - 8000m
                if (layer.width < 100 || layer.width > 8000) {
                    widthInput.classList.add('error-border');
                    errorText.style.display = 'block';
                    hintText.innerHTML = '宽度越界，请检查输入';
                } else {
                    widthInput.classList.remove('error-border');
                    errorText.style.display = 'none';
                    // 横向比例计算：横向安全飞行区60%、左缓冲带20%、右缓冲带20%
                    const safeW = (layer.width * 0.6).toFixed(1);
                    const bufferW = (layer.width * 0.2).toFixed(1);
                    hintText.innerHTML = `内部宽：<span style="color:#0ea5e9">安全区 ${safeW}m</span> | 左右各 ${bufferW}m`;
                }
            });
        }

        addLayerBtn.addEventListener('click', () => {
            const lastEnd = layers.length > 0 ? layers[layers.length - 1].end : 20;
            const isHighAltitude = lastEnd >= 1000;
            layers.push({
                id: layers.length + 1,
                name: `新增隔离层${layers.length + 1}号`,
                start: lastEnd,
                end: lastEnd + (isHighAltitude ? 300 : 100),
                width: isHighAltitude ? 8000 : 1000
            });
            renderLayers();
        });

        // 页面初始化时执行一次渲染
        renderLayers();
    </script>
</body>

</html>
