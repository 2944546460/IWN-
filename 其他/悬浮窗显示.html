<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IWN廊道运维管理平台 - 悬浮提示面板原型</title>
    <style>
        /* 模拟大屏深色背景 */
        body {
            background-color: #050b14;
            background-image: radial-gradient(circle at 50% 50%, #0a192f 0%, #050b14 100%);
            color: #ffffff;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            padding: 50px;
            margin: 0;
            box-sizing: border-box;
        }

        /* 科技感面板基础容器 */
        .tech-popover {
            width: 300px;
            background: rgba(6, 22, 51, 0.85);
            border: 1px solid #1890ff;
            box-shadow: inset 0 0 20px rgba(24, 144, 255, 0.2), 0 8px 24px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            position: relative;
            /* 科技感切角与装饰线 */
            background-image: 
                linear-gradient(#1890ff, #1890ff),
                linear-gradient(#1890ff, #1890ff),
                linear-gradient(#1890ff, #1890ff),
                linear-gradient(#1890ff, #1890ff);
            background-repeat: no-repeat;
            background-size: 8px 2px, 2px 8px;
            background-position: 
                0 0, 0 0, 
                100% 100%, 100% 100%;
            border-radius: 2px;
        }

        /* 标题栏设计 (契合参考图的蓝底渐变) */
        .popover-header {
            background: linear-gradient(90deg, rgba(24, 144, 255, 0.7) 0%, rgba(24, 144, 255, 0) 100%);
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(24, 144, 255, 0.4);
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        .popover-header::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 14px;
            background-color: #00ffff;
            margin-right: 8px;
            box-shadow: 0 0 8px #00ffff;
        }

        /* 内容区布局 */
        .popover-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 键值对行 */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 13px;
            line-height: 1.5;
        }

        .info-label {
            color: #8cc8ff;
            flex-shrink: 0;
            width: 110px;
        }

        .info-value {
            color: #e6f7ff;
            text-align: right;
            word-break: break-all;
        }

        /* 状态高亮色 */
        .status-normal { color: #52c41a; font-weight: bold; text-shadow: 0 0 5px rgba(82, 196, 26, 0.5); }
        .status-warning { color: #faad14; font-weight: bold; text-shadow: 0 0 5px rgba(250, 173, 20, 0.5); }
        .status-danger { color: #ff4d4f; font-weight: bold; text-shadow: 0 0 5px rgba(255, 77, 79, 0.5); }
        .text-cyan { color: #00ffff; }

        /* 底部引导文案 */
        .popover-footer {
            padding: 8px 15px;
            font-size: 12px;
            color: #4a80b5;
            text-align: right;
            border-top: 1px dashed rgba(24, 144, 255, 0.3);
            background: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="tech-popover">
        <div class="popover-header">廊道信息</div>
        <div class="popover-body">
            <div class="info-row"><div class="info-label">廊道id</div><div class="info-value">COR-2026-001</div></div>
            <div class="info-row"><div class="info-label">廊道名称</div><div class="info-value">杭绍甬低空主干道</div></div>
	    <div class="info-row"><div class="info-label">廊道层数量</div><div class="info-value">3</div></div>
        </div>
    </div>

    <div class="tech-popover">
        <div class="popover-header">起降点信息</div>
        <div class="popover-body">
            <div class="info-row"><div class="info-label">起降点名称</div><div class="info-value">富阳服务区测试节点</div></div>
            <div class="info-row"><div class="info-label">经度</div><div class="info-value">119.8267</div></div>
	    <div class="info-row"><div class="info-label">纬度</div><div class="info-value">30.0464</div></div>
            <div class="info-row"><div class="info-label">海拔高度</div><div class="info-value">56.0m</div></div>
            <div class="info-row"><div class="info-label">关联廊道</div><div class="info-value text-cyan">杭绍甬低空主干道</div></div>
        </div>
    </div>

    <div class="tech-popover">
        <div class="popover-header">地面节点信息</div>
        <div class="popover-body">
            <div class="info-row"><div class="info-label">节点名称</div><div class="info-value">富阳基站-029</div></div>
            <div class="info-row"><div class="info-label">IP地址</div><div class="info-value">192.168.9.9</div></div>
            <div class="info-row"><div class="info-label">经度</div><div class="info-value">119.8267</div></div>
	    <div class="info-row"><div class="info-label">纬度</div><div class="info-value">30.0464</div></div>
            <div class="info-row"><div class="info-label">海拔高度</div><div class="info-value">56.0m</div></div>
        </div>

</body>
</html>
